name: Actualizar licitaciones

on:
  schedule:
    - cron: '45 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar scraper
        run: python fetch_licitaciones.py

      - name: Commit y push del JSON
        run: |
          git config user.name "tender-watch-bot"
          git config user.email "bot@tender-watch"
          git add data/licitaciones.json
          git diff --staged --quiet || git commit -m "Actualización diaria $(date +'%Y-%m-%d %H:%M')"
          git push
